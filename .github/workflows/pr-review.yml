name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: us-east-1
    secrets:
      AWS_BEARER_TOKEN_BEDROCK:
        required: true

concurrency:
  group: pr-review-${{ github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout aio-reusable-workflows
        uses: actions/checkout@v4
        with:
          repository: adobe/aio-reusable-workflows
          ref: main
          path: .aio-rw

      - name: Run PR review
        run: node .aio-rw/.github/scripts/pr-review.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ inputs.aws_region }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          # GITHUB_REPOSITORY is set automatically by GitHub Actions (owner/repo)
